kind = "web"
previewPath = "/"
title = "Music Together"
version = "1.0.0"
id = "artifacts/music-together"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22338

[services.development]
run = "pnpm --filter @workspace/music-together run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/music-together", "run", "build" ]
publicDir = "artifacts/music-together/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22338"
BASE_PATH = "/"
